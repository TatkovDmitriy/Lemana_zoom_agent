name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @lemana/shared build

      - name: Typecheck all packages
        run: pnpm typecheck

      - name: Lint all packages
        run: pnpm lint

      - name: Run tests
        run: pnpm test:run

      - name: Build all packages
        run: pnpm build
        env:
          # Dummy env vars so Next.js build doesn't throw on missing vars
          FIREBASE_PROJECT_ID: ci-dummy
          FIREBASE_ADMIN_CLIENT_EMAIL: ci@dummy.com
          FIREBASE_ADMIN_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nMIICI\n-----END PRIVATE KEY-----\n"
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-dummy
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-dummy.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-dummy
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-dummy.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:000:web:000
          ANTHROPIC_API_KEY: ci-dummy
          TELEGRAM_BOT_TOKEN: 0000000000:ci-dummy-token
          ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          GITHUB_TOKEN_OBSIDIAN: ci-dummy
          WEB_APP_BASE_URL: https://ci.example.com
          NEXTAUTH_URL: https://ci.example.com
